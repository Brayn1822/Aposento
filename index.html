<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo que siento cuando te veo</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* Encabezado */
        .header {
            position: absolute;
            top: 5%;
            text-align: center;
            z-index: 10;
            width: 100%;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
            margin-bottom: 5px;
        }

        .subtext {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Contador */
        #countdown-container {
            margin-top: 10px;
            color: #ffb3c1;
            font-weight: 500;
            font-size: 1.2rem;
            background: rgba(255, 77, 109, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Contenedor de Botones */
        .button-container {
            position: absolute;
            bottom: 8%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            z-index: 20;
            width: 90%;
            max-width: 400px;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 77, 109, 0.4);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .day-btn:hover {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 0 15px #ff4d6d;
            transform: translateY(-3px);
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Lo que siento cuando te veo</h1>
        <div class="subtext">cada beso tuyo me enloquece</div>
        <div id="countdown-container">
            Siguiente sorpresa en: <span id="timer">00:00:00</span>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="romanceCanvas"></canvas>
    </div>

    <div class="button-container">
        <a href="https://www.youtube.com/watch?v=e81y94Bi3jU" target="_blank" class="day-btn">Martes</a>
        <a href="#" target="_blank" class="day-btn">Miércoles</a>
        <a href="#" target="_blank" class="day-btn">Jueves</a>
        <a href="#" target="_blank" class="day-btn">Viernes</a>
    </div>

    <script>
        const canvas = document.getElementById('romanceCanvas');
        const ctx = canvas.getContext('2d');

        // --- LÓGICA DEL CONTADOR (Hora Colombia UTC-5) ---
        function updateTimer() {
            const now = new Date();
            
            // Creamos la fecha objetivo: hoy a las 7:00 AM
            let target = new Date();
            target.setHours(7, 0, 0, 0);

            // Si ya pasaron las 7 AM, la meta es mañana a las 7 AM
            if (now > target) {
                target.setDate(target.getDate() + 1);
            }

            const diff = target - now;

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // --- LÓGICA DE LAS MARIPOSAS (Tu código original mantenido) ---
        let butterflies = [];
        const butterflyCount = 130;
        const manPathData = "M250,100 c-20,0 -35,15 -35,35 c0,20 15,35 35,35 s35,-15 35,-35 C285,115 270,100 250,100 z M250,175 c-15,0 -20,10 -30,20 c-30,5 -70,15 -90,40 c-10,15 -15,40 -10,80 c5,50 15,150 20,250 h110 h110 c5,-100 15,-200 20,-250 c5,-40 0,-65 -10,-80 c-20,-25 -60,-35 -90,-40 C270,185 265,175 250,175 z";
        const manPath = new Path2D(manPathData);
        const stomachCenter = { x: 250, y: 380 };

        function resize() {
            canvas.width = 500;
            canvas.height = 700;
            const scale = Math.min(window.innerWidth / 500, window.innerHeight / 900) * 0.8;
            canvas.style.width = (500 * scale) + "px";
            canvas.style.height = (700 * scale) + "px";
        }

        class Butterfly {
            constructor() { this.init(); }
            init() {
                this.x = stomachCenter.x + (Math.random() - 0.5) * 40;
                this.y = stomachCenter.y + (Math.random() - 0.5) * 40;
                this.size = Math.random() * 5 + 3;
                this.vx = (Math.random() - 0.5) * 2.5;
                this.vy = (Math.random() - 0.5) * 2.5;
                const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#ffffff', '#c9184a'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.flap = Math.random() * Math.PI * 2;
                this.flapSpeed = 0.15 + Math.random() * 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.flap += this.flapSpeed;
                if (!ctx.isPointInPath(manPath, this.x, this.y)) {
                    this.vx *= -1; this.vy *= -1;
                }
                const dx = stomachCenter.x - this.x;
                const dy = stomachCenter.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 120) {
                    this.vx += dx * 0.001;
                    this.vy += dy * 0.001;
                }
                this.vx += (Math.random() - 0.5) * 0.15;
                this.vy += (Math.random() - 0.5) * 0.15;
            }
            draw() {
                const wingW = Math.abs(Math.sin(this.flap)) * this.size;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.atan2(this.vy, this.vx) + Math.PI/2);
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-wingW*2, -this.size, -wingW, this.size);
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(wingW*2, -this.size, wingW, this.size);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillRect(-0.5, -this.size/2, 1, this.size);
                ctx.restore();
            }
        }

        function setupButterflies() {
            butterflies = [];
            for (let i = 0; i < butterflyCount; i++) butterflies.push(new Butterfly());
        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            const grad = ctx.createLinearGradient(0, 100, 0, 600);
            grad.addColorStop(0, '#0a0a0a');
            grad.addColorStop(0.5, '#151515');
            grad.addColorStop(1, '#050505');
            ctx.fillStyle = grad;
            ctx.fill(manPath);
            ctx.strokeStyle = 'rgba(255, 77, 109, 0.3)';
            ctx.stroke(manPath);
            ctx.restore();

            butterflies.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(drawScene);
        }

        window.addEventListener('resize', resize);
        resize();
        setupButterflies();
        drawScene();
    </script>
</body>
</html>
